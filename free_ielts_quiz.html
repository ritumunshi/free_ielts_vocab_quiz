<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELT Study Master</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e40af 100%); color: white; }
  .page { display: none; min-height: 100vh; padding: 20px; }
  .page.active { display: flex; flex-direction: column; align-items: center; }
  .container { max-width: 700px; width: 100%; }
  h1 { font-size: 2rem; font-weight: 800; text-align: center; margin-bottom: 8px; }
  .subtitle { color: #a5b4fc; text-align: center; margin-bottom: 24px; font-size: 15px; }
  .card-box { background: rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
  .card-box h2 { color: #e0e7ff; font-size: 16px; margin-bottom: 12px; }
  .tags { display: flex; flex-wrap: wrap; gap: 7px; }
  .tag { padding: 5px 11px; border-radius: 20px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; background: rgba(255,255,255,0.15); color: #e0e7ff; transition: all 0.2s; }
  .tag.active { background: #818cf8; color: #1e1b4b; }
  .tag:hover { background: rgba(255,255,255,0.25); }
  .tag.active:hover { background: #818cf8; }
  .count-info { color: #a5b4fc; font-size: 13px; margin-top: 10px; }
  .count-info b { color: white; }
  .mode-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .mode-btn { border: none; border-radius: 14px; padding: 20px 12px; cursor: pointer; color: white; text-align: center; transition: transform 0.2s; }
  .mode-btn:hover { transform: scale(1.03); }
  .mode-btn .icon { font-size: 32px; margin-bottom: 6px; }
  .mode-btn .name { font-size: 16px; font-weight: 700; }
  .mode-btn .desc { font-size: 11px; opacity: 0.8; margin-top: 3px; }
  .btn-flash { background: linear-gradient(135deg, #818cf8, #6366f1); }
  .btn-quiz { background: linear-gradient(135deg, #34d399, #059669); }
  .btn-spell { background: linear-gradient(135deg, #f59e0b, #d97706); }
  .breakdown { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px; }
  .breakdown h3 { color: #a5b4fc; font-size: 14px; margin-bottom: 10px; }
  .breakdown-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .breakdown-item { display: flex; justify-content: space-between; padding: 4px 8px; background: rgba(255,255,255,0.05); border-radius: 6px; border-left: 3px solid; font-size: 11px; }
  .breakdown-item span:first-child { color: #e0e7ff; }
  .breakdown-item span:last-child { color: #a5b4fc; }

  /* SHARED */
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; width: 100%; }
  .back-btn { background: rgba(255,255,255,0.1); border: none; color: #a5b4fc; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; }
  .back-btn:hover { background: rgba(255,255,255,0.2); }
  .progress-bar-bg { background: rgba(255,255,255,0.08); border-radius: 4px; height: 6px; margin-bottom: 14px; width: 100%; }
  .progress-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; background: #818cf8; }
  .progress-bar-fill.green { background: #34d399; }
  .progress-bar-fill.yellow { background: #f59e0b; }
  .cat-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; margin-bottom: 10px; }
  .cat-badge span { color: white; font-size: 11px; font-weight: 600; }

  /* FLASH */
  #page-flash { background: linear-gradient(135deg, #1e1b4b, #312e81); }
  .flashcard { border-radius: 20px; padding: 40px 28px; text-align: center; cursor: pointer; min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 20px 60px rgba(0,0,0,0.4); transition: background 0.4s; user-select: none; width: 100%; }
  .flashcard-front { background: linear-gradient(135deg, #4338ca, #3730a3); }
  .flashcard-back { background: linear-gradient(135deg, #059669, #047857); }
  .card-label { color: rgba(255,255,255,0.6); font-size: 11px; letter-spacing: 1px; margin-bottom: 10px; text-transform: uppercase; }
  .card-def-big { color: white; font-size: 17px; line-height: 1.6; }
  .card-term-big { color: white; font-size: 22px; font-weight: 700; line-height: 1.4; }
  .tap-hint { color: rgba(255,255,255,0.4); font-size: 12px; margin-top: 18px; }
  .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
  .action-btn { border-radius: 12px; padding: 14px; cursor: pointer; font-size: 15px; font-weight: 600; border: 2px solid; transition: all 0.2s; }
  .btn-unknown { background: rgba(239,68,68,0.2); border-color: #ef4444; color: #fca5a5; }
  .btn-known { background: rgba(34,197,94,0.2); border-color: #22c55e; color: #86efac; }
  .btn-unknown:hover { background: rgba(239,68,68,0.35); }
  .btn-known:hover { background: rgba(34,197,94,0.35); }

  /* DONE */
  .done-wrap { max-width: 500px; width: 100%; text-align: center; margin-top: 40px; }
  .big-emoji { font-size: 60px; margin-bottom: 12px; }
  .done-title { font-size: 26px; font-weight: 700; margin-bottom: 18px; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
  .stat-box { border-radius: 12px; padding: 18px; border: 2px solid; }
  .stat-box.green { background: rgba(34,197,94,0.15); border-color: #22c55e; }
  .stat-box.red { background: rgba(239,68,68,0.15); border-color: #ef4444; }
  .stat-num { font-size: 34px; font-weight: 700; }
  .stat-num.green { color: #86efac; }
  .stat-num.red { color: #fca5a5; }
  .stat-label.green { color: #4ade80; font-size: 14px; }
  .stat-label.red { color: #f87171; font-size: 14px; }
  .full-btn { width: 100%; border: none; border-radius: 12px; padding: 13px 24px; font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
  .retry-btn { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
  .menu-btn-light { background: rgba(255,255,255,0.1); color: #a5b4fc; font-size: 14px; }
  .full-btn:hover { opacity: 0.9; }

  /* QUIZ */
  #page-quiz { background: linear-gradient(135deg, #064e3b, #065f46); }
  .quiz-q-box { background: rgba(255,255,255,0.08); border-radius: 14px; padding: 24px 20px; margin-bottom: 16px; text-align: center; }
  .quiz-q-label { color: #a7f3d0; font-size: 13px; margin-bottom: 8px; }
  .quiz-q-text { color: white; font-size: 18px; font-weight: 400; line-height: 1.5; }
  .quiz-q-ask { color: #6ee7b7; font-size: 13px; margin-top: 12px; font-style: italic; }
  .quiz-options { display: grid; gap: 9px; }
  .quiz-opt { background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.1); border-radius: 11px; padding: 13px 18px; color: #e0e7ff; font-size: 14px; font-weight: 600; text-align: left; cursor: pointer; transition: all 0.2s; line-height: 1.4; width: 100%; }
  .quiz-opt:hover:not([disabled]) { background: rgba(255,255,255,0.18); }
  .quiz-opt.correct { background: rgba(34,197,94,0.2); border-color: #22c55e; color: #86efac; }
  .quiz-opt.wrong { background: rgba(239,68,68,0.2); border-color: #ef4444; color: #fca5a5; }
  .quiz-opt[disabled] { cursor: default; }
  .quiz-score-text { color: #6ee7b7; font-size: 15px; }
  .quiz-count-text { color: #6ee7b7; font-size: 13px; }
  .next-btn { width: 100%; background: linear-gradient(135deg, #34d399, #059669); border: none; border-radius: 11px; padding: 13px; color: white; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 10px; display: none; }
  .next-btn.visible { display: block; }
  .next-btn:hover { opacity: 0.9; }
  .quiz-done { text-align: center; padding: 30px 16px; }
  .quiz-done h2 { font-size: 26px; margin: 12px 0 8px; }
  .quiz-result-score { color: #6ee7b7; font-size: 20px; margin-bottom: 4px; }
  .quiz-result-msg { color: #a7f3d0; font-size: 14px; margin-bottom: 20px; }

  /* SPELLING */
  #page-spell { background: linear-gradient(135deg, #451a03, #78350f); }
  .spell-def-box { background: rgba(255,255,255,0.1); border-radius: 16px; padding: 28px 24px; margin-bottom: 18px; text-align: center; }
  .spell-def-label { color: #fcd34d; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
  .spell-def-text { color: white; font-size: 18px; line-height: 1.6; }
  .spell-input-wrap { margin-bottom: 14px; }
  .spell-input { width: 100%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 16px 20px; color: white; font-size: 20px; font-weight: 600; text-align: center; outline: none; transition: border-color 0.2s; letter-spacing: 2px; }
  .spell-input::placeholder { color: rgba(255,255,255,0.3); font-weight: 400; letter-spacing: 0; }
  .spell-input:focus { border-color: #fcd34d; }
  .spell-input.correct { border-color: #22c55e; background: rgba(34,197,94,0.15); color: #86efac; }
  .spell-input.wrong { border-color: #ef4444; background: rgba(239,68,68,0.15); color: #fca5a5; }
  .spell-check-btn { width: 100%; background: linear-gradient(135deg, #f59e0b, #d97706); border: none; border-radius: 12px; padding: 14px; color: white; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
  .spell-check-btn:hover { opacity: 0.9; }
  .spell-feedback { border-radius: 12px; padding: 16px 20px; text-align: center; margin-bottom: 12px; display: none; }
  .spell-feedback.show { display: block; }
  .spell-feedback.correct { background: rgba(34,197,94,0.2); border: 2px solid #22c55e; }
  .spell-feedback.wrong { background: rgba(239,68,68,0.15); border: 2px solid #ef4444; }
  .spell-feedback .answer { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .spell-feedback .answer.c { color: #86efac; }
  .spell-feedback .answer.w { color: #fca5a5; }
  .spell-feedback .correct-answer { color: #fcd34d; font-size: 15px; }
  .spell-hint-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); color: #fcd34d; border-radius: 8px; padding: 7px 14px; cursor: pointer; font-size: 13px; margin-bottom: 12px; }
  .spell-hint { color: #fcd34d; font-size: 15px; letter-spacing: 6px; text-align: center; font-family: monospace; margin-bottom: 10px; min-height: 24px; }
  .spell-score-text { color: #fcd34d; font-size: 14px; }
  .spell-next-btn { width: 100%; background: rgba(255,255,255,0.1); border: none; border-radius: 12px; padding: 13px; color: #fcd34d; font-size: 15px; font-weight: 600; cursor: pointer; display: none; }
  .spell-next-btn.visible { display: block; }
  .spell-next-btn:hover { background: rgba(255,255,255,0.18); }

  @media (max-width: 500px) {
    h1 { font-size: 1.4rem; }
    .mode-grid { grid-template-columns: 1fr; }
    .breakdown-grid { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr; }
    .card-def-big { font-size: 15px; }
    .card-term-big { font-size: 18px; }
  }
</style>
</head>
<body>

<!-- MENU -->
<div id="page-menu" class="page active">
  <div class="container">
    <h1>📚 ELT Study Master</h1>
    <p class="subtitle" id="subtitle-count"></p>

    <div class="card-box">
      <h2>📂 Filter by Topic</h2>
      <div class="tags" id="tag-container"></div>
      <p class="count-info" id="count-info"></p>
    </div>

    <div class="mode-grid">
      <button class="mode-btn btn-flash" onclick="startFlash()">
        <div class="icon">🃏</div>
        <div class="name">Flashcards</div>
        <div class="desc">Read def → recall word</div>
      </button>
      <button class="mode-btn btn-quiz" onclick="startQuiz()">
        <div class="icon">🧠</div>
        <div class="name">Quiz Mode</div>
        <div class="desc">Pick correct word</div>
      </button>
      <button class="mode-btn btn-spell" onclick="startSpell()">
        <div class="icon">✍️</div>
        <div class="name">Spelling</div>
        <div class="desc">Type the word/phrase</div>
      </button>
    </div>

    <div class="breakdown">
      <h3>📋 Topic Breakdown</h3>
      <div class="breakdown-grid" id="breakdown-grid"></div>
    </div>
  </div>
</div>

<!-- FLASHCARD PAGE -->
<div id="page-flash" class="page">
  <div class="container">
    <div class="top-bar">
      <button class="back-btn" onclick="showPage('menu')">← Back</button>
      <span id="flash-counter" style="color:#e0e7ff;font-size:15px;"></span>
      <span id="flash-score" style="color:#a5b4fc;font-size:13px;"></span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="flash-progress"></div></div>
    <div id="flash-badge" class="cat-badge"><span id="flash-cat"></span></div>

    <!-- Show DEFINITION first -->
    <div class="flashcard flashcard-front" id="flashcard" onclick="flipCard()">
      <div class="card-label" id="card-label">MEANING / DEFINITION</div>
      <div id="card-content" class="card-def-big"></div>
      <div class="tap-hint" id="tap-hint">👆 Tap to reveal the word</div>
    </div>

    <div class="action-btns" id="action-btns" style="display:none;">
      <button class="action-btn btn-unknown" onclick="markCard(false)">❌ Still Learning</button>
      <button class="action-btn btn-known" onclick="markCard(true)">✅ Got It!</button>
    </div>
  </div>
</div>

<!-- FLASH DONE -->
<div id="page-flashdone" class="page" style="justify-content:center;">
  <div class="done-wrap">
    <div class="big-emoji">🎉</div>
    <div class="done-title">Round Complete!</div>
    <div class="stats-grid">
      <div class="stat-box green">
        <div class="stat-num green" id="known-count">0</div>
        <div class="stat-label green">✅ Known</div>
      </div>
      <div class="stat-box red">
        <div class="stat-num red" id="unknown-count">0</div>
        <div class="stat-label red">❌ Review Again</div>
      </div>
    </div>
    <button class="full-btn retry-btn" id="retry-btn" onclick="retryUnknown()" style="display:none;"></button>
    <button class="full-btn menu-btn-light" onclick="showPage('menu')">← Back to Menu</button>
  </div>
</div>

<!-- QUIZ PAGE -->
<div id="page-quiz" class="page">
  <div class="container">
    <div class="top-bar">
      <button class="back-btn" style="color:#6ee7b7;" onclick="showPage('menu')">← Back</button>
      <span class="quiz-score-text" id="quiz-score">Score: 0 / 0</span>
      <span class="quiz-count-text" id="quiz-count">1 / 0</span>
    </div>
    <div id="quiz-content"></div>
  </div>
</div>

<!-- SPELLING PAGE -->
<div id="page-spell" class="page">
  <div class="container">
    <div class="top-bar">
      <button class="back-btn" style="color:#fcd34d;" onclick="showPage('menu')">← Back</button>
      <span class="spell-score-text" id="spell-score">✅ 0 &nbsp; ❌ 0</span>
      <span style="color:#fcd34d;font-size:13px;" id="spell-counter">1 / 0</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill yellow" id="spell-progress"></div></div>
    <div id="spell-badge" class="cat-badge"><span id="spell-cat"></span></div>

    <div class="spell-def-box">
      <div class="spell-def-label">📖 Meaning / Definition</div>
      <div class="spell-def-text" id="spell-def"></div>
    </div>

    <div class="spell-hint" id="spell-hint"></div>

    <div class="spell-input-wrap">
      <input class="spell-input" id="spell-input" type="text" placeholder="Type the word or phrase..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" onkeydown="if(event.key==='Enter') checkSpell()">
    </div>

    <button class="spell-hint-btn" onclick="showHint()">💡 Show hint</button>

    <div class="spell-feedback" id="spell-feedback">
      <div class="answer" id="spell-answer-text"></div>
      <div class="correct-answer" id="spell-correct-answer"></div>
    </div>

    <button class="spell-check-btn" id="spell-check-btn" onclick="checkSpell()">Check ✓</button>
    <button class="spell-next-btn" id="spell-next-btn" onclick="nextSpell()">Next →</button>
  </div>
</div>

<!-- SPELL DONE -->
<div id="page-spelldone" class="page" style="justify-content:center;">
  <div class="done-wrap">
    <div class="big-emoji" id="spell-done-emoji">🎉</div>
    <div class="done-title">Spelling Round Done!</div>
    <div class="stats-grid">
      <div class="stat-box green">
        <div class="stat-num green" id="spell-known-count">0</div>
        <div class="stat-label green">✅ Correct</div>
      </div>
      <div class="stat-box red">
        <div class="stat-num red" id="spell-unknown-count">0</div>
        <div class="stat-label red">❌ Missed</div>
      </div>
    </div>
    <button class="full-btn retry-btn" id="spell-retry-btn" onclick="retrySpell()" style="display:none;"></button>
    <button class="full-btn menu-btn-light" onclick="showPage('menu')">← Back to Menu</button>
  </div>
</div>

<script>
const allCards = [
  // CONNECTORS
  { term: "Firstly / Secondly / Thirdly", def: "Listing points in order", category: "Connectors: Listing" },
  { term: "Furthermore / Moreover / What is more", def: "Adding or reinforcing a point", category: "Connectors: Reinforcement" },
  { term: "In conclusion / To conclude / To summarise", def: "Ending or wrapping up an essay", category: "Connectors: Summary" },
  { term: "For example / For instance / Namely", def: "Giving examples to support a point", category: "Connectors: Examples" },
  { term: "However / Nevertheless / Yet", def: "Contrasting two points", category: "Connectors: Contrast" },
  { term: "On the other hand / In contrast / Conversely", def: "Showing contrast or opposing view", category: "Connectors: Contrast" },
  { term: "Similarly / Likewise / Equally", def: "Showing similarity between two ideas", category: "Connectors: Similarity" },
  { term: "In particular / Especially / Particularly", def: "Highlighting something specific", category: "Connectors: Highlighting" },
  { term: "In general / On the whole / Generally", def: "Making a generalising statement", category: "Connectors: Generalising" },
  { term: "In other words / To put it more simply", def: "Reformulating or clarifying a previous point", category: "Connectors: Reformulation" },
  { term: "As a result / Therefore / Consequently", def: "Showing result or consequence of something", category: "Connectors: Result" },
  { term: "Although / Even though / However much", def: "Expressing concession — something unexpected", category: "Connectors: Concession" },
  { term: "Alternatively / On the other hand / Rather", def: "Expressing an alternative option or idea", category: "Connectors: Alternative" },
  { term: "Overall / In brief / Therefore", def: "Summary connectors used in conclusions", category: "Connectors: Summary" },
  { term: "Obviously / Clearly / Naturally / Of course", def: "Stating the obvious or something self-evident", category: "Connectors: Obvious" },

  // TASK 1
  { term: "Soar / Leap / Rocket / Surge / Climb", def: "Verbs meaning to increase sharply — UP verbs", category: "Task 1: Trends" },
  { term: "Sink / Dip / Drop / Plummet / Slip back", def: "Verbs meaning to decrease or fall — DOWN verbs", category: "Task 1: Trends" },
  { term: "Significant / Dramatic / Sudden / Substantial / Sharp", def: "Adjectives describing the degree of a change in data", category: "Task 1: Adjectives" },
  { term: "Consistent / Steady / Constant", def: "Adjectives describing slow or stable gradual trends", category: "Task 1: Adjectives" },
  { term: "Significantly / Dramatically / Substantially / Sharply", def: "Adverbs placed before or after trend verbs", category: "Task 1: Adverbs" },
  { term: "Upward / Downward / Overall", def: "Adjectives used to describe the general direction of a trend", category: "Task 1: Adjectives" },
  { term: "Fluctuate", def: "To vary a great deal up and down repeatedly", category: "Task 1: Trends" },
  { term: "Plateaued", def: "Remained steady or unchanged for a period", category: "Task 1: Trends" },
  { term: "Forecast / Projected / Anticipated", def: "Words used for predicted or expected future data", category: "Task 1: Data" },

  // TASK 2
  { term: "To embark on / To begin with / Initially", def: "Phrases used to start body paragraph 1 in Task 2", category: "Task 2: Essay Structure" },
  { term: "On the contrary / On the flip side / Secondly", def: "Phrases used to start body paragraph 2 in Task 2", category: "Task 2: Essay Structure" },
  { term: "In conclusion / To summarise / Overall / To sum up", def: "Phrases used to begin the concluding paragraph", category: "Task 2: Essay Structure" },
  { term: "It is commonly believed", def: "Phrase used to introduce a widely held opinion", category: "Task 2: Essay Structure" },
  { term: "In support of the previous argument", def: "Phrase used to link back to the last point made", category: "Task 2: Essay Structure" },

  // MAPS
  { term: "Enlarged / Expanded / Extended / Developed", def: "Map vocabulary describing something becoming bigger", category: "Task 1: Maps" },
  { term: "Demolished / Knocked down / Torn down / Removed", def: "Map vocabulary describing something being taken away", category: "Task 1: Maps" },
  { term: "Constructed / Built / Erected / Introduced / Added", def: "Map vocabulary describing new additions to an area", category: "Task 1: Maps" },
  { term: "Converted / Redeveloped / Modernised / Renovated", def: "Map vocabulary describing a change in use or appearance", category: "Task 1: Maps" },
  { term: "To the north of / To the east of / In the west", def: "Directional location vocabulary used in map tasks", category: "Task 1: Maps" },

  // WORK
  { term: "Productivity / Output / Incentives", def: "Vocabulary relating to work performance and motivation", category: "Topic: Work & Career" },
  { term: "Work/Life Balance / Job Satisfaction", def: "Terms relating to employee wellbeing", category: "Topic: Work & Career" },
  { term: "Redundancy / Downsize / Outsource / Restructure", def: "Vocabulary for job loss and company reorganisation", category: "Topic: Work & Career" },

function getColor(cat) {
  if (catColors[cat]) return catColors[cat];
  if (cat.startsWith("Band 8")) return "#059669";
  return "#4f46e5";
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── STATE ──
let selectedCat = "All";
const categories = ["All", ...Array.from(new Set(allCards.map(c => c.category)))];
function getFiltered() { return selectedCat === "All" ? allCards : allCards.filter(c => c.category === selectedCat); }

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

// ── MENU ──
function buildMenu() {
  document.getElementById('subtitle-count').textContent = allCards.length + ' flashcards across ' + (categories.length - 1) + ' topics';
  const tagContainer = document.getElementById('tag-container');
  tagContainer.innerHTML = '';
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tag' + (cat === selectedCat ? ' active' : '');
    const count = cat === 'All' ? allCards.length : allCards.filter(c => c.category === cat).length;
    const label = cat === 'All' ? 'All' : cat.replace('Topic: ', '').replace('Band 8: ', 'B8: ').replace('Connectors: ', '🔗 ').replace('Task 1: ', 'T1: ').replace('Task 2: ', 'T2: ');
    btn.textContent = label + ' (' + count + ')';
    btn.onclick = () => { selectedCat = cat; buildMenu(); };
    tagContainer.appendChild(btn);
  });
  document.getElementById('count-info').innerHTML = 'Selected: <b>' + getFiltered().length + ' cards</b>';
  const grid = document.getElementById('breakdown-grid');
  grid.innerHTML = '';
  categories.filter(c => c !== 'All').forEach(cat => {
    const count = allCards.filter(c => c.category === cat).length;
    const item = document.createElement('div');
    item.className = 'breakdown-item';
    item.style.borderLeftColor = getColor(cat);
    item.innerHTML = '<span>' + cat + '</span><span>' + count + '</span>';
    grid.appendChild(item);
  });
}

// ── FLASHCARDS (show DEFINITION → recall WORD) ──
let flashDeck = [], flashIndex = 0, flashFlipped = false, flashKnown = [], flashUnknown = [];

function startFlash() {
  flashDeck = shuffle(getFiltered());
  flashIndex = 0; flashFlipped = false; flashKnown = []; flashUnknown = [];
  showPage('flash');
  renderFlash();
}

function renderFlash() {
  if (flashIndex >= flashDeck.length) { showFlashDone(); return; }
  const card = flashDeck[flashIndex];
  document.getElementById('flash-counter').textContent = (flashIndex + 1) + ' / ' + flashDeck.length;
  document.getElementById('flash-score').textContent = '✅ ' + flashKnown.length + ' ❌ ' + flashUnknown.length;
  document.getElementById('flash-progress').style.width = (flashIndex / flashDeck.length * 100) + '%';
  document.getElementById('flash-badge').style.background = getColor(card.category);
  document.getElementById('flash-cat').textContent = card.category;

  const fc = document.getElementById('flashcard');
  fc.className = 'flashcard flashcard-front';
  document.getElementById('card-label').textContent = 'MEANING / DEFINITION';
  document.getElementById('card-content').className = 'card-def-big';
  document.getElementById('card-content').textContent = card.def;
  document.getElementById('tap-hint').style.display = '';
  document.getElementById('action-btns').style.display = 'none';
  flashFlipped = false;
}

function flipCard() {
  if (flashFlipped) return;
  flashFlipped = true;
  const card = flashDeck[flashIndex];
  const fc = document.getElementById('flashcard');
  fc.className = 'flashcard flashcard-back';
  document.getElementById('card-label').textContent = 'WORD / PHRASE';
  document.getElementById('card-content').className = 'card-term-big';
  document.getElementById('card-content').textContent = card.term;
  document.getElementById('tap-hint').style.display = 'none';
  document.getElementById('action-btns').style.display = 'grid';
}

function markCard(known) {
  if (known) flashKnown.push(flashDeck[flashIndex]);
  else flashUnknown.push(flashDeck[flashIndex]);
  flashIndex++;
  renderFlash();
}

function showFlashDone() {
  document.getElementById('known-count').textContent = flashKnown.length;
  document.getElementById('unknown-count').textContent = flashUnknown.length;
  const btn = document.getElementById('retry-btn');
  if (flashUnknown.length > 0) { btn.style.display = 'block'; btn.textContent = '🔁 Retry ' + flashUnknown.length + ' Missed Cards'; }
  else btn.style.display = 'none';
  showPage('flashdone');
}

function retryUnknown() {
  flashDeck = shuffle(flashUnknown); flashIndex = 0; flashFlipped = false; flashKnown = []; flashUnknown = [];
  showPage('flash'); renderFlash();
}

// ── QUIZ (show DEFINITION → pick WORD) ──
let quizDeck = [], quizIndex = 0, quizScore = 0, quizOptions = [], quizAnswered = false;

function startQuiz() {
  quizDeck = shuffle(getFiltered()); quizIndex = 0; quizScore = 0;
  showPage('quiz'); renderQuiz();
}

function getQuizOptions(card) {
  const others = shuffle(allCards.filter(c => c.term !== card.term)).slice(0, 3);
  return shuffle([card, ...others]);
}

function renderQuiz() {
  const content = document.getElementById('quiz-content');
  if (quizIndex >= quizDeck.length) {
    const pct = Math.round(quizScore / quizDeck.length * 100);
    const emoji = pct > 80 ? '🏆' : pct > 60 ? '👍' : '📖';
    const msg = pct > 80 ? "Excellent! You're ready for the test! 🌟" : pct > 60 ? "Good progress! Keep reviewing! 💪" : "Keep studying — you've got this! 📚";
    content.innerHTML = `<div class="quiz-done"><div style="font-size:60px">${emoji}</div><h2>Quiz Complete!</h2><p class="quiz-result-score">${quizScore} / ${quizDeck.length} correct (${pct}%)</p><p class="quiz-result-msg">${msg}</p><button class="full-btn" style="background:linear-gradient(135deg,#34d399,#059669);margin-bottom:10px;" onclick="startQuiz()">🔄 Retry Quiz</button><button class="full-btn menu-btn-light" onclick="showPage('menu')">← Menu</button></div>`;
    return;
  }
  const card = quizDeck[quizIndex];
  quizOptions = getQuizOptions(card);
  quizAnswered = false;
  document.getElementById('quiz-score').textContent = 'Score: ' + quizScore + ' / ' + quizIndex;
  document.getElementById('quiz-count').textContent = (quizIndex + 1) + ' / ' + quizDeck.length;
  const pct = (quizIndex / quizDeck.length * 100);
  const letters = ['A', 'B', 'C', 'D'];
  const opts = quizOptions.map((opt, i) =>
    `<button class="quiz-opt" id="qopt-${i}" onclick="handleAnswer(${i})"><span style="font-weight:700;margin-right:8px;">${letters[i]}.</span>${opt.term}</button>`
  ).join('');
  content.innerHTML = `
    <div class="progress-bar-bg"><div class="progress-bar-fill green" style="width:${pct}%"></div></div>
    <div class="cat-badge" style="background:${getColor(card.category)};margin-bottom:12px;"><span>${card.category}</span></div>
    <div class="quiz-q-box">
      <div class="quiz-q-label">📖 Meaning / Definition:</div>
      <div class="quiz-q-text">${card.def}</div>
      <div class="quiz-q-ask">↓ Which word or phrase matches this meaning?</div>
    </div>
    <div class="quiz-options">${opts}</div>
    <button class="next-btn" id="qnext-btn" onclick="nextQuiz()">Next Question →</button>`;
}

function handleAnswer(i) {
  if (quizAnswered) return;
  quizAnswered = true;
  const card = quizDeck[quizIndex];
  if (quizOptions[i].term === card.term) quizScore++;
  quizOptions.forEach((opt, idx) => {
    const btn = document.getElementById('qopt-' + idx);
    btn.disabled = true;
    if (opt.term === card.term) btn.classList.add('correct');
    else if (idx === i) btn.classList.add('wrong');
  });
  document.getElementById('quiz-score').textContent = 'Score: ' + quizScore + ' / ' + (quizIndex + 1);
  document.getElementById('qnext-btn').classList.add('visible');
}

function nextQuiz() { quizIndex++; renderQuiz(); }

function renderSpell() {

  document.getElementById('spell-score').textContent = '✅ ' + spellCorrect + ' ❌ ' + spellWrong;
  document.getElementById('spell-progress').style.width = (spellIndex / spellDeck.length * 100) + '%';
  document.getElementById('spell-badge').style.background = getColor(card.category);
  document.getElementById('spell-cat').textContent = card.category;
  document.getElementById('spell-def').textContent = card.def;
  document.getElementById('spell-hint').textContent = '';

  const input = document.getElementById('spell-input');
  input.value = '';
  input.className = 'spell-input';
  input.disabled = false;

  document.getElementById('spell-feedback').className = 'spell-feedback';
  document.getElementById('spell-feedback').style.display = 'none';
  document.getElementById('spell-check-btn').style.display = 'block';
  document.getElementById('spell-next-btn').className = 'spell-next-btn';

  setTimeout(() => input.focus(), 100);
}

function showHint() {
  const card = spellDeck[spellIndex];
  const term = card.term;
  // Show first letter of each word, rest as underscores
  const hint = term.split('').map((ch, i) => {
    if (ch === ' ' || ch === '/' || ch === '-') return ch;
    // Show first letter of each word
    const isWordStart = i === 0 || [' ', '/'].includes(term[i-1]);
    return isWordStart ? ch : '_';
  }).join('');
  document.getElementById('spell-hint').textContent = hint;
}

function normalize(str) {
  return str.toLowerCase().replace(/\s*\/\s*/g, '/').replace(/\s+/g, ' ').trim();
}

function checkSpell() {
  if (spellChecked) return;
  const card = spellDeck[spellIndex];
  const typed = document.getElementById('spell-input').value.trim();
  if (!typed) return;
  spellChecked = true;

  const correct = normalize(typed) === normalize(card.term);
  const input = document.getElementById('spell-input');
  input.className = 'spell-input ' + (correct ? 'correct' : 'wrong');
  input.disabled = true;

  const fb = document.getElementById('spell-feedback');
  fb.className = 'spell-feedback show ' + (correct ? 'correct' : 'wrong');
  fb.style.display = 'block';

  const answerEl = document.getElementById('spell-answer-text');
  const correctEl = document.getElementById('spell-correct-answer');

  if (correct) {
    answerEl.className = 'answer c';
    answerEl.textContent = '✅ Correct!';
    correctEl.textContent = '';
    spellCorrect++;
  } else {
    answerEl.className = 'answer w';
    answerEl.textContent = '❌ Not quite';
    correctEl.textContent = '✔ Answer: ' + card.term;
    spellWrong++;
    spellMissed.push(card);
  }

  document.getElementById('spell-score').textContent = '✅ ' + spellCorrect + ' ❌ ' + spellWrong;
  document.getElementById('spell-check-btn').style.display = 'none';
  document.getElementById('spell-next-btn').className = 'spell-next-btn visible';
}

function nextSpell() { spellIndex++; renderSpell(); }

function showSpellDone() {
  document.getElementById('spell-known-count').textContent = spellCorrect;
  document.getElementById('spell-unknown-count').textContent = spellWrong;
  const pct = spellDeck.length > 0 ? Math.round(spellCorrect / spellDeck.length * 100) : 0;
  document.getElementById('spell-done-emoji').textContent = pct > 80 ? '🏆' : pct > 60 ? '👍' : '📖';
  const btn = document.getElementById('spell-retry-btn');
  if (spellMissed.length > 0) { btn.style.display = 'block'; btn.textContent = '🔁 Retry ' + spellMissed.length + ' Missed Words'; }
  else btn.style.display = 'none';
  showPage('spelldone');
}

function retrySpell() {
  spellDeck = shuffle(spellMissed); spellIndex = 0; spellCorrect = 0; spellWrong = 0; spellMissed = [];
  showPage('spell'); renderSpell();
}

buildMenu();
</script>
</body>
</html>
